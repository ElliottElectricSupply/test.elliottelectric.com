<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Connectivity Checker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      padding-top: 2rem;
      background: #f9f9f9;
    }

    .status-checking {
      color: orange;
      font-weight: bold;
    }

    .status-success {
      color: green;
      font-weight: bold;
    }

    .status-failure {
      color: red;
      font-weight: bold;
    }

    .status-skipped {
      color: gray;
      font-style: italic;
    }

    #ip-section {
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="text-center text-primary mb-4">
      <img src="images/EES-Logo_RGB-SingleColor-Reflex.png" alt="Elliott Electric Supply" height="48" style="vertical-align:middle;margin-right:0.5rem;">
      URL Connectivity Checker
    </h1>

    <div id="ip-section" class="alert alert-secondary text-center" role="alert">
      Public IP: Checking...
    </div>
	
    <div class="table-responsive">
      <table class="table table-striped table-bordered">
        <thead class="table-primary">
          <tr>
            <th scope="col">URL</th>
            <th scope="col">Status</th>
          </tr>
        </thead>
        <tbody id="url-status-table"></tbody>
      </table>
    </div>
	
  </div>

  <script>
    const urls = [
      'http://www.ElliottElectric.com',
	  'https://www.ElliottElectric.com',
      'http://api.ElliottElectric.com',
      'https://api.ElliottElectric.com',
	  'http://www.eesnet.com',
	  'https://www.eesnet.com',
      'http://www.NacSpace.com',
	  'https://www.NacSpace.com',
      'http://199.38.25.203',
      'https://www.google.com',
	  'http://www.google.com',
      'https://example.org',
	  'http://example.org'
    ];

    const tableBody = document.getElementById('url-status-table');
    const isHttps = location.protocol === 'https:';

    urls.forEach(url => {
      const row = document.createElement('tr');
      const urlCell = document.createElement('td');
      const statusCell = document.createElement('td');
      const link = document.createElement('a');
      link.href = url;
      link.textContent = url;
      link.target = '_blank';
      link.rel = 'noopener noreferrer';
      urlCell.appendChild(link);

      row.appendChild(urlCell);
      row.appendChild(statusCell);
      tableBody.appendChild(row);

      if (isHttps && url.startsWith('http://')) {
        statusCell.innerHTML = '⏭️ Skipped (HTTP not checked from HTTPS)';
        statusCell.classList.add('status-skipped');
        return;
      }

      statusCell.innerHTML = '⏳ Checking...';
      statusCell.classList.add('status-checking');

      fetch(link.href, { method: 'HEAD', mode: 'no-cors' })
        .then(response => {
          statusCell.innerHTML = '✅ Success';
          statusCell.classList.remove('status-checking');
          statusCell.classList.add('status-success');
        })
        .catch(error => {
          statusCell.innerHTML = '❌ Failed: ' + error.message;
          statusCell.classList.remove('status-checking');
          statusCell.classList.add('status-failure');
        });
    });

    fetch('https://api.ipify.org?format=json')
      .then(response => response.json())
      .then(data => {
        document.getElementById('ip-section').textContent = 'Public IP: ' + data.ip;
      })
      .catch(error => {
        document.getElementById('ip-section').textContent = 'Public IP: Unable to retrieve';
      });
  </script>
</body>
</html>
